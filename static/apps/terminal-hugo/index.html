<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d1117">
    <meta name="description" content="Aprende terminal, Git y Hugo Blox de forma interactiva">
    <title>Hugo Terminal Trainer Pro</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 512 512%22><text y=%22380px%22 font-size=%22380%22>🎓</text></svg>">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- PWA Service Worker Registration -->
    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            // Inline SW for simplicity - in production, use separate file
            const swCode = `
                const CACHE_NAME = 'hugo-trainer-v1';
                const ASSETS = [
                    './',
                    './index.html',
                    './css/styles.css',
                    './js/app.js',
                    './js/data.js',
                    './js/terminal.js',
                    './js/progress.js',
                    './js/scenarios.js',
                    './js/pwa.js'
                ];
                
                self.addEventListener('install', (e) => {
                    e.waitUntil(
                        caches.open(CACHE_NAME).then((cache) => cache.addAll(ASSETS))
                    );
                });
                
                self.addEventListener('fetch', (e) => {
                    e.respondWith(
                        caches.match(e.request).then((response) => 
                            response || fetch(e.request)
                        )
                    );
                });
            `;
            
            const blob = new Blob([swCode], {type: 'application/javascript'});
            const swUrl = URL.createObjectURL(blob);
            
            navigator.serviceWorker.register(swUrl)
                .then(() => console.log('SW registered'))
                .catch((err) => console.error('SW failed:', err));
        }
        
        // PWA Install Prompt
        let installPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            installPrompt = e;
            document.getElementById('install-btn').classList.remove('hidden');
        });
        
        document.getElementById('install-btn')?.addEventListener('click', async () => {
            if (installPrompt) {
                installPrompt.prompt();
                const {outcome} = await installPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('install-btn').classList.add('hidden');
                }
                installPrompt = null;
            }
        });
    </script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="header-title">
                <span class="emoji">🎓</span> Hugo Terminal Trainer Pro
            </div>
            <div class="stats-bar">
                <div class="stat-badge" title="Racha diaria">
                    🔥 <span id="streak">0</span> días
                </div>
                <div class="stat-badge" title="Progreso total">
                    📊 <span id="total-progress">0</span>%
                </div>
                <div class="stat-badge" title="Lecciones completadas">
                    📚 <span id="completed-count">0</span>/<span id="total-count">0</span>
                </div>
                <button class="btn-secondary" id="install-btn" onclick="installApp()" style="display:none;">
                    📲 Instalar App
                </button>
                <button class="btn-secondary" onclick="showResetModal()">
                    🔄 Reiniciar
                </button>
            </div>
        </div>
    </header>

    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-btn" onclick="toggleSidebar()">
        ☰ Menú
    </button>

    <!-- Tabs Navigation -->
    <nav class="tabs">
        <button class="tab-btn active" data-tab="lessons" onclick="switchTab('lessons')">
            📚 Lecciones
        </button>
        <button class="tab-btn" data-tab="scenarios" onclick="switchTab('scenarios')">
            🎯 Escenarios
        </button>
        <button class="tab-btn" data-tab="reference" onclick="switchTab('reference')">
            📖 Referencia
        </button>
    </nav>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar (Lessons) -->
        <aside class="sidebar" id="sidebar">
            <div id="units-list"></div>
        </aside>

        <!-- Content Area -->
        <main class="content-area">
            <!-- Lessons Tab -->
            <div id="lessons-tab" class="tab-content">
                <div id="lesson-content"></div>
            </div>

            <!-- Scenarios Tab -->
            <div id="scenarios-tab" class="tab-content hidden">
                <div id="scenarios-list" class="scenarios-grid"></div>
                <div id="scenario-content" class="hidden"></div>
            </div>

            <!-- Reference Tab -->
            <div id="reference-tab" class="tab-content hidden">
                <div id="reference-content"></div>
            </div>
        </main>
    </div>

    <!-- Reset Modal -->
    <div id="reset-modal" class="modal-overlay hidden">
        <div class="modal">
            <h2>⚠️ Reiniciar progreso</h2>
            <p>¿Estás seguro? Esto borrará todo tu progreso completado, incluyendo lecciones y escenarios.</p>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="hideResetModal()">Cancelar</button>
                <button class="btn-primary" style="background: #da3633;" onclick="confirmReset()">
                    Sí, reiniciar
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts (loaded in order) -->
    <script src="js/data.js"></script>
    <script src="js/progress.js"></script>
    <script src="js/terminal.js"></script>
    <script src="js/scenarios.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

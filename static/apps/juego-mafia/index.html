        return {
          ...structuredClone(baseState),
          ...parsed,
          karma: { ...baseState.karma, ...(parsed.karma || {}) },
          detector: { ...baseState.detector, ...(parsed.detector || {}) }

    function chooseOption(chapterIndex, optionIndex) {
      if (getDecision(chapterIndex)) return;
      const chapter = getChapterWithModifiers(chapterIndex);
      const option = chapter.options[optionIndex];
      if (!option) return;

      state.rispetto = clamp(state.rispetto + option.delta, 0, 100);
      Object.entries(option.karma || {}).forEach(([k, v]) => {
        state.karma[k] = (state.karma[k] || 0) + v;
      });

      state.decisions.push({
        chapter: chapterIndex,
        optionIndex,
        quadrant: option.quadrant,
        delta: option.delta,
        consequence: option.consequence,
        don: option.don
      });
      state.quadrants.push(option.quadrant);

      if (state.rispetto <= 0) {
        state.gameState = "gameover";
      } else if (state.rispetto >= 100) {
        state.gameState = "victory";

      `;
      typeWriter(document.getElementById("donType"), decision.don);
      const nextBtn = document.getElementById("nextChapter");
      if (nextBtn) {
        nextBtn.onclick = () => {
          state.currentChapter = Math.min(chapters.length, state.currentChapter + 1);
          saveState();
          renderStory();
        };
      }
    }

    function typeWriter(el, text) {
      if (!el) return;
      el.textContent = "";
      let i = 0;
      const tick = () => {
        if (i < text.length) {
          el.textContent += text[i++];
          setTimeout(tick, 16);
        }
      };
      tick();
    }

    function renderCouncil() {
      const el = sections.consejo;
      const c = state.detector.current;
      const left = state.detector.left;

      el.innerHTML = `
        <div class="panel p-4">
          <h2 class="text-2xl text-[#d4a037] mb-1">Consejo de Familia</h2>
          <p class="text-[#888] mb-4">Clasifica el comportamiento antes de que se enfríe el café. Tienes 10 segundos.</p>
          <div class="flex gap-4 text-sm mb-3">
            <p>Racha: <strong>${state.detector.streak}</strong></p>
            <p>Mejor: <strong>${state.detector.best}</strong></p>
            <p>Tiempo: <strong id="timerVal">${left}s</strong></p>
          </div>
          <div class="panel p-3 mb-3 min-h-[110px]">
            <p id="caseText">${c ? c.text : "Pulsa empezar y que Dios reparta reflejos."}</p>
          </div>
          <div class="grid grid-cols-2 gap-2 mb-3">
            <button class="option-btn" data-det="inteligente">Inteligente</button>
            <button class="option-btn" data-det="malvado">Malvado</button>
            <button class="option-btn" data-det="incauto">Incauto</button>
            <button class="option-btn" data-det="estupido">Estúpido</button>
          </div>
          <div class="flex gap-2 mb-3">
            <button id="startDetector" class="option-btn">${c ? "Siguiente caso" : "Empezar"}</button>
          </div>
          <div class="panel p-3">
            <p class="text-sm text-[#888] mb-1">Comentario de Don Carlo</p>
            <p id="detectorComment" class="leading-relaxed">"El reloj no te evalúa moralmente, hijo. Solo mide si piensas antes de hablar".</p>
          </div>
        </div>
      `;

      document.getElementById("startDetector").onclick = nextDetectorCase;
      [...el.querySelectorAll("[data-det]")].forEach(btn => {
        btn.onclick = () => answerDetector(btn.dataset.det);
      });
    }

    function nextDetectorCase() {
      clearInterval(timer);
      const idx = Math.floor(Math.random() * detectorCases.length);
      state.detector.current = detectorCases[idx];
      state.detector.left = 10;
      saveState();
      renderCouncil();
      timer = setInterval(() => {
        state.detector.left -= 1;
        const t = document.getElementById("timerVal");
        if (t) t.textContent = `${state.detector.left}s`;
        if (state.detector.left <= 0) {
          clearInterval(timer);
          resolveDetector(false, null, true);
        }
      }, 1000);
    }

    function answerDetector(choice) {
      if (!state.detector.current || state.detector.left <= 0) return;
      clearInterval(timer);
      const ok = choice === state.detector.current.answer;
      resolveDetector(ok, choice, false);
    }

    function resolveDetector(ok, choice, timedOut) {
      if (ok) {
        state.detector.streak += 1;
        state.detector.best = Math.max(state.detector.best, state.detector.streak);
        state.detector.score += 1;
        state.rispetto = clamp(state.rispetto + 2, 0, 100);
      } else {
        state.detector.streak = 0;
        state.detector.score -= 1;
        state.rispetto = clamp(state.rispetto - 1, 0, 100);
      }

      const correct = state.detector.current.answer;
      const text = timedOut
        ? `Se acabó el reloj. Era ${correct.toUpperCase()}. ${donSarcasm[correct]}`
        : ok
          ? `Correcto. Era ${correct.toUpperCase()}. ${donSarcasm[correct]}`
          : `No, hijo. Marcaste ${choice.toUpperCase()}, pero era ${correct.toUpperCase()}. ${donSarcasm[correct]}`;

      state.detector.current = null;
      state.detector.left = 10;

      if (state.rispetto <= 0) state.gameState = "gameover";
      if (state.rispetto >= 100) state.gameState = "victory";

      saveState();
      renderRispetto();
      renderCouncil();
      const comment = document.getElementById("detectorComment");
      if (comment) typeWriter(comment, text);
      renderStory();
      renderProfile();
    }

    function getDominantQuadrant() {
      const count = { inteligente: 0, malvado: 0, incauto: 0, estupido: 0 };
      state.quadrants.forEach(q => count[q] = (count[q] || 0) + 1);
      let winner = "inteligente";
      Object.keys(count).forEach(k => {
        if (count[k] > count[winner]) winner = k;
      });
      const labels = {
        inteligente: "Inteligente",
        malvado: "Malvado",
        incauto: "Incauto",
        estupido: "Estúpido"
      };
      return { key: winner, label: labels[winner], count };
    }

    function renderProfile() {
      const el = sections.perfil;
      const total = state.quadrants.length || 1;
      const count = { inteligente: 0, malvado: 0, incauto: 0, estupido: 0 };
      state.quadrants.forEach(q => count[q] = (count[q] || 0) + 1);

      const rows = [
        ["Inteligente", "inteligente"],
        ["Malvado", "malvado"],
        ["Incauto", "incauto"],
        ["Estúpido", "estupido"]
      ].map(([label, key]) => {
        const pct = Math.round((count[key] / total) * 100);
        return `<div class="mb-3"><div class="flex justify-between text-sm"><span>${label}</span><span>${pct}%</span></div><div class="bar"><span style="width:${pct}%"></span></div></div>`;
      }).join("");

      const dominant = getDominantQuadrant().key;
      const diagnosis = {
        inteligente: "Serás Don algún día. Si sobrevives.",
        malvado: "Te respeto. No te doy la espalda, pero te respeto.",
        incauto: "Hijo... eres buena persona. Eso no es un cumplido en este negocio.",
        estupido: "...¿Estás seguro de que no te adoptaron?"
      };

      el.innerHTML = `
        <div class="panel p-4">
          <h2 class="text-2xl text-[#d4a037] mb-1">Perfil de Estratega</h2>
          <p class="text-[#888] mb-4">Tus decisiones dejan patrón, y el patrón deja destino.</p>
          ${rows}
          <div class="panel p-3 mt-4">
            <p class="text-sm text-[#888] mb-1">Diagnóstico de Don Carlo</p>
            <p>${diagnosis[dominant]}</p>
          </div>
          <button id="resetAll" class="option-btn mt-4">Borrar progreso</button>
        </div>
      `;
      document.getElementById("resetAll").onclick = resetGame;
    }

    function resetGame() {
      clearInterval(timer);
      state = structuredClone(baseState);
      saveState();
      renderAll();
    }

    window.replayChapter = function(idx) {
      const el = sections.historia;
      const chapter = getChapterWithModifiers(idx);
      const decision = getDecision(idx);
      if (!decision) return;
      renderOutcome(chapter, decision, false);
    };

    tabs.forEach(btn => {
      btn.addEventListener("click", () => {
        tabs.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        Object.values(sections).forEach(sec => sec.classList.add("hidden"));
        sections[btn.dataset.tab].classList.remove("hidden");
      });
    });

    renderAll();
  </script>
</body>
</html>
